name: Validação de Testes

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: |
          pip install fastapi uvicorn pytest pytest-cov behave httpx
      - name: Rodar Testes e Validar 75%
        run: |
          python -m pytest --cov=main --cov-fail-under=75
